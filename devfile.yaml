schemaVersion: 2.2.2
metadata:
  name: kaoto-examples
components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi8-latest
      memoryLimit: 4G
      cpuLimit: 4000m
      cpuRequest: 1000m
commands:
  - id: jbang-trust-apache
    exec:
      label: "JBang - Trust Apache organization"
      component: tools
      workingDir: ${PROJECTS_ROOT}/kaoto-examples
      # Taken from where the JBang cli is installed in the universal developer image
      commandLine: "source ~/.bashrc && jbang trust add -o --fresh --quiet https://github.com/apache/"
      group:
        kind: build
  - id: jbang-install-camel
    exec:
      label: "JBang - Install Camel CLI"
      component: tools
      workingDir: ${PROJECTS_ROOT}/kaoto-examples
      commandLine: "source ~/.bashrc && jbang app install --force camel@apache/camel"
      group:
        kind: build

events:
  postStart:
    - jbang-trust-apache
    - jbang-install-camel
